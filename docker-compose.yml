# Optional local dev database (use Neon DATABASE_URL in production)
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: venueflow
      POSTGRES_PASSWORD: venueflow
      POSTGRES_DB: venueflow
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
