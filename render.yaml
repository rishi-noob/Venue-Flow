services:
  - type: web
    name: venue-flow-api
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm --filter @venue-flow/db build && pnpm --filter @venue-flow/shared build && pnpm --filter @venue-flow/api build
    startCommand: pnpm --filter @venue-flow/api start
    preDeployCommand: pnpm --filter @venue-flow/db migrate
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
    healthCheckPath: /health
